<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>练习写字 - Feuilles de pratique HSK3</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  @page { margin: 15mm; }
  body { font-family: "Noto Sans SC", "SimSun", "STSong", serif; margin: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 5px; }
  .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }

  /* Section headers */
  .section-title {
    font-size: 16px;
    font-weight: bold;
    margin: 25px 0 10px 0;
    padding: 6px 12px;
    background: #f5f5f5;
    border-left: 4px solid #c0392b;
    page-break-after: avoid;
  }

  .char-row { 
    display: flex; 
    align-items: center; 
    margin-bottom: 12px; 
    page-break-inside: avoid; 
  }
  .char-info {
    width: 110px;
    font-size: 12px;
    line-height: 1.3;
    flex-shrink: 0;
  }
  .char-info .hanzi { font-size: 18px; font-weight: bold; }
  .char-info .pinyin { color: #c0392b; font-size: 11px; }
  .char-info .meaning { color: #666; font-size: 10px; }
  .grid-container { display: flex; gap: 0; align-items: flex-start; }
  .cell {
    width: 52px;
    height: 52px;
    border: 1.5px solid #333;
    position: relative;
    box-sizing: border-box;
  }
  .cell::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    width: 0; height: 100%;
    border-left: 1px dashed #ccc;
  }
  .cell::after {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    width: 100%; height: 0;
    border-top: 1px dashed #ccc;
  }
  .cell.model {
    background: #fafafa;
    cursor: pointer;
  }
  .cell.model .char {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    color: #333;
    z-index: 1;
  }
  .cell.ghost .char {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    color: #e0e0e0;
    z-index: 1;
  }

  /* HanziWriter model cell */
  .cell.model svg { z-index: 2; position: relative; }
  .cell.model .stroke-hint {
    display: none; /* shown on print */
  }

  /* Word practice: double cells */
  .word-pair {
    display: flex;
    gap: 0;
  }
  .word-pair .cell {
    width: 52px;
    height: 52px;
  }
  .pair-separator {
    width: 8px;
    flex-shrink: 0;
  }

  .page-break { page-break-after: always; }
  .footer { text-align: center; color: #aaa; font-size: 10px; margin-top: 30px; }
  
  @media print {
    body { margin: 0; }
    .no-print { display: none; }
    .cell.model svg { display: none !important; }
    .cell.model .stroke-hint { display: block !important; }
  }

  .print-btn {
    display: block; margin: 20px auto; padding: 12px 30px;
    font-size: 16px; background: #c0392b; color: white; border: none;
    border-radius: 6px; cursor: pointer;
  }
  .print-btn:hover { background: #e74c3c; }

  .legend {
    text-align: center; font-size: 12px; color: #888; margin-bottom: 15px;
  }
  .legend span { margin: 0 10px; }
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">🖨️ Imprimer / Sauvegarder en PDF</button>

<h1>练习写字 - Feuilles de Pratique</h1>
<p class="subtitle">HSK3 - 20 Verbes Essentiels</p>
<p class="legend no-print">
  <span>🖱️ Clique sur un caractère modèle pour voir l'animation des traits</span>
</p>

<!-- SECTION 1: Individual characters -->
<div class="section-title">一、Caractères individuels - 单字练习</div>
<div id="sheets"></div>

<!-- SECTION 2: Compound word practice -->
<div class="section-title" style="margin-top: 35px;">二、Mots composés - 词语练习</div>
<div id="word-sheets"></div>

<div class="footer">chinese-learning / HSK3 练习</div>

<script>
const chars = [
  {hanzi: "决", pinyin: "jué", meaning: "décider", word: "决定"},
  {hanzi: "定", pinyin: "dìng", meaning: "décider", word: "决定"},
  {hanzi: "关", pinyin: "guān", meaning: "se soucier", word: "关心"},
  {hanzi: "心", pinyin: "xīn", meaning: "cœur", word: "关心"},
  {hanzi: "解", pinyin: "jiě", meaning: "comprendre", word: "了解"},
  {hanzi: "信", pinyin: "xìn", meaning: "croire", word: "相信"},
  {hanzi: "担", pinyin: "dān", meaning: "s'inquiéter", word: "担心"},
  {hanzi: "习", pinyin: "xí", meaning: "s'habituer", word: "习惯"},
  {hanzi: "惯", pinyin: "guàn", meaning: "habitude", word: "习惯"},
  {hanzi: "需", pinyin: "xū", meaning: "besoin", word: "需要"},
  {hanzi: "发", pinyin: "fā", meaning: "découvrir", word: "发现"},
  {hanzi: "现", pinyin: "xiàn", meaning: "apparaître", word: "发现"},
  {hanzi: "决", pinyin: "jué", meaning: "résoudre", word: "解决"},
  {hanzi: "变", pinyin: "biàn", meaning: "changer", word: "变化"},
  {hanzi: "化", pinyin: "huà", meaning: "transformation", word: "变化"},
  {hanzi: "检", pinyin: "jiǎn", meaning: "vérifier", word: "检查"},
  {hanzi: "查", pinyin: "chá", meaning: "examiner", word: "检查"},
  {hanzi: "选", pinyin: "xuǎn", meaning: "choisir", word: "选择"},
  {hanzi: "择", pinyin: "zé", meaning: "choisir", word: "选择"},
  {hanzi: "较", pinyin: "jiào", meaning: "comparer", word: "比较"},
  {hanzi: "影", pinyin: "yǐng", meaning: "influencer", word: "影响"},
  {hanzi: "响", pinyin: "xiǎng", meaning: "résonner", word: "影响"},
  {hanzi: "根", pinyin: "gēn", meaning: "racine/selon", word: "根据"},
  {hanzi: "据", pinyin: "jù", meaning: "selon", word: "根据"},
  {hanzi: "参", pinyin: "cān", meaning: "participer", word: "参加"},
  {hanzi: "提", pinyin: "tí", meaning: "améliorer", word: "提高"},
  {hanzi: "注", pinyin: "zhù", meaning: "attention", word: "注意"},
  {hanzi: "意", pinyin: "yì", meaning: "sens/idée", word: "注意"},
  {hanzi: "记", pinyin: "jì", meaning: "se souvenir", word: "记得"},
  {hanzi: "接", pinyin: "jiē", meaning: "accepter", word: "接受"},
  {hanzi: "受", pinyin: "shòu", meaning: "recevoir", word: "接受"},
];

// Deduplicate by hanzi
const seen = new Set();
const unique = chars.filter(c => { if(seen.has(c.hanzi)) return false; seen.add(c.hanzi); return true; });

// Extract compound words (2+ chars)
const wordSet = new Set();
const words = [];
chars.forEach(c => {
  if(c.word && c.word.length >= 2 && !wordSet.has(c.word)) {
    wordSet.add(c.word);
    words.push({ word: c.word, pinyin: chars.filter(x => x.word === c.word).map(x => x.pinyin).join(' '), meaning: c.meaning });
  }
});

// ===== SECTION 1: Individual characters with stroke order =====
const container = document.getElementById('sheets');
const PRACTICE_CELLS = 7;

unique.forEach((c, i) => {
  const row = document.createElement('div');
  row.className = 'char-row';
  
  const infoDiv = document.createElement('div');
  infoDiv.className = 'char-info';
  infoDiv.innerHTML = `
    <div class="hanzi">${c.word}</div>
    <div class="pinyin">${c.pinyin}</div>
    <div class="meaning">${c.meaning}</div>
  `;
  row.appendChild(infoDiv);

  const gridDiv = document.createElement('div');
  gridDiv.className = 'grid-container';

  // Model cell with HanziWriter
  const modelCell = document.createElement('div');
  modelCell.className = 'cell model';
  const writerId = 'hw-' + i;
  const writerTarget = document.createElement('div');
  writerTarget.id = writerId;
  writerTarget.style.cssText = 'width:48px;height:48px;position:absolute;top:1px;left:1px;z-index:2;';
  modelCell.appendChild(writerTarget);
  
  // Fallback for print
  const printFallback = document.createElement('div');
  printFallback.className = 'stroke-hint';
  printFallback.innerHTML = `<span class="char">${c.hanzi}</span>`;
  modelCell.appendChild(printFallback);
  
  gridDiv.appendChild(modelCell);

  // Ghost cell
  const ghostCell = document.createElement('div');
  ghostCell.className = 'cell ghost';
  ghostCell.innerHTML = `<span class="char">${c.hanzi}</span>`;
  gridDiv.appendChild(ghostCell);

  // Empty cells
  for(let j = 0; j < PRACTICE_CELLS - 2; j++) {
    const emptyCell = document.createElement('div');
    emptyCell.className = 'cell';
    gridDiv.appendChild(emptyCell);
  }

  row.appendChild(gridDiv);
  container.appendChild(row);

  // Init HanziWriter
  try {
    const writer = HanziWriter.create(writerId, c.hanzi, {
      width: 48,
      height: 48,
      padding: 2,
      showOutline: true,
      showCharacter: true,
      strokeColor: '#333',
      outlineColor: '#ddd',
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 300,
      radicalColor: '#c0392b',
      showStrokeOrder: true,
    });
    
    // Click to animate
    modelCell.addEventListener('click', () => {
      writer.animateCharacter();
    });
  } catch(e) {
    // Fallback: just show the character
    writerTarget.innerHTML = `<span style="font-size:36px;display:flex;align-items:center;justify-content:center;height:100%;">${c.hanzi}</span>`;
  }

  // Page break every 14
  if((i+1) % 14 === 0 && i < unique.length - 1) {
    const pb = document.createElement('div');
    pb.className = 'page-break';
    container.appendChild(pb);
  }
});

// ===== SECTION 2: Compound word practice =====
const wordContainer = document.getElementById('word-sheets');
const WORD_PRACTICE_REPS = 4; // how many times to practice the full word

words.forEach((w, wi) => {
  const row = document.createElement('div');
  row.className = 'char-row';

  const infoDiv = document.createElement('div');
  infoDiv.className = 'char-info';
  infoDiv.innerHTML = `
    <div class="hanzi">${w.word}</div>
    <div class="pinyin">${w.pinyin}</div>
    <div class="meaning">${w.meaning}</div>
  `;
  row.appendChild(infoDiv);

  const gridDiv = document.createElement('div');
  gridDiv.className = 'grid-container';

  // Model pair
  const modelPair = document.createElement('div');
  modelPair.className = 'word-pair';
  for(const ch of w.word) {
    const cell = document.createElement('div');
    cell.className = 'cell model';
    cell.innerHTML = `<span class="char">${ch}</span>`;
    modelPair.appendChild(cell);
  }
  gridDiv.appendChild(modelPair);

  // Separator
  const sep1 = document.createElement('div');
  sep1.className = 'pair-separator';
  gridDiv.appendChild(sep1);

  // Ghost pair
  const ghostPair = document.createElement('div');
  ghostPair.className = 'word-pair';
  for(const ch of w.word) {
    const cell = document.createElement('div');
    cell.className = 'cell ghost';
    cell.innerHTML = `<span class="char">${ch}</span>`;
    ghostPair.appendChild(cell);
  }
  gridDiv.appendChild(ghostPair);

  // Empty practice pairs
  for(let r = 0; r < WORD_PRACTICE_REPS; r++) {
    const sep = document.createElement('div');
    sep.className = 'pair-separator';
    gridDiv.appendChild(sep);

    const emptyPair = document.createElement('div');
    emptyPair.className = 'word-pair';
    for(const ch of w.word) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      emptyPair.appendChild(cell);
    }
    gridDiv.appendChild(emptyPair);
  }

  row.appendChild(gridDiv);
  wordContainer.appendChild(row);

  // Page break every 10 words
  if((wi+1) % 10 === 0 && wi < words.length - 1) {
    const pb = document.createElement('div');
    pb.className = 'page-break';
    wordContainer.appendChild(pb);
  }
});
</script>
</body>
</html>
