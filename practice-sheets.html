<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>练习写字 - Feuilles de pratique HSK3</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap');
  
  @page { margin: 15mm; }
  body { font-family: "Noto Sans SC", "SimSun", "STSong", serif; margin: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 5px; }
  .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
  
  .section-title {
    font-size: 16px; font-weight: bold;
    margin: 25px 0 10px 0; padding: 6px 12px;
    background: #f5f5f5; border-left: 4px solid #c0392b;
    page-break-after: avoid;
  }
  
  .char-row { 
    display: flex; align-items: center; margin-bottom: 12px; 
    page-break-inside: avoid; 
  }
  .char-info {
    width: 110px; font-size: 12px; line-height: 1.3; flex-shrink: 0;
  }
  .char-info .hanzi { font-size: 18px; font-weight: bold; }
  .char-info .pinyin { color: #c0392b; font-size: 11px; }
  .char-info .meaning { color: #666; font-size: 10px; }
  .grid-container { display: flex; gap: 0; }
  .cell {
    width: 52px; height: 52px;
    border: 1.5px solid #333;
    position: relative; box-sizing: border-box;
  }
  .cell::before {
    content: ''; position: absolute;
    top: 0; left: 50%; width: 0; height: 100%;
    border-left: 1px dashed #ccc;
  }
  .cell::after {
    content: ''; position: absolute;
    left: 0; top: 50%; width: 100%; height: 0;
    border-top: 1px dashed #ccc;
  }
  .cell.model { background: #fafafa; }
  .cell .char {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px; z-index: 1;
    font-family: "Ma Shan Zheng", "KaiTi", "STKaiti", "楷体", serif;
  }
  .cell.model .char { color: #333; }
  .cell.ghost .char { color: #e0e0e0; }
  
  /* Stroke order cell */
  .cell.stroke-order {
    background: #fff8f0;
    border-color: #c0392b;
  }
  .cell.stroke-order svg { 
    position: absolute; top: 1px; left: 1px; z-index: 2;
  }

  /* Word practice */
  .word-pair { display: flex; gap: 0; }
  .pair-separator { width: 8px; flex-shrink: 0; }

  .page-break { page-break-after: always; }
  .footer { text-align: center; color: #aaa; font-size: 10px; margin-top: 30px; }
  
  @media print {
    body { margin: 0; }
    .no-print { display: none; }
  }
  .print-btn {
    display: block; margin: 20px auto; padding: 12px 30px;
    font-size: 16px; background: #c0392b; color: white; border: none;
    border-radius: 6px; cursor: pointer;
  }
  .print-btn:hover { background: #e74c3c; }
  .legend { text-align: center; font-size: 12px; color: #888; margin-bottom: 15px; }
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">🖨️ Imprimer / Sauvegarder en PDF</button>

<h1>练习写字 - Feuilles de Pratique</h1>
<p class="subtitle">HSK3 - 20 Verbes Essentiels</p>
<p class="legend no-print">🖱️ Clique sur la case rouge pour animer l'ordre des traits</p>

<div class="section-title">一、Caractères individuels - 单字练习</div>
<div id="sheets"></div>

<div class="section-title" style="margin-top: 35px;">二、Mots composés - 词语练习</div>
<div id="word-sheets"></div>

<div class="footer">chinese-learning / HSK3 练习</div>

<script>
const chars = [
  {hanzi: "决", pinyin: "jué", meaning: "décider", word: "决定"},
  {hanzi: "定", pinyin: "dìng", meaning: "décider", word: "决定"},
  {hanzi: "关", pinyin: "guān", meaning: "se soucier", word: "关心"},
  {hanzi: "心", pinyin: "xīn", meaning: "cœur", word: "关心"},
  {hanzi: "解", pinyin: "jiě", meaning: "comprendre", word: "了解"},
  {hanzi: "信", pinyin: "xìn", meaning: "croire", word: "相信"},
  {hanzi: "担", pinyin: "dān", meaning: "s'inquiéter", word: "担心"},
  {hanzi: "习", pinyin: "xí", meaning: "s'habituer", word: "习惯"},
  {hanzi: "惯", pinyin: "guàn", meaning: "habitude", word: "习惯"},
  {hanzi: "需", pinyin: "xū", meaning: "besoin", word: "需要"},
  {hanzi: "发", pinyin: "fā", meaning: "découvrir", word: "发现"},
  {hanzi: "现", pinyin: "xiàn", meaning: "apparaître", word: "发现"},
  {hanzi: "决", pinyin: "jué", meaning: "résoudre", word: "解决"},
  {hanzi: "变", pinyin: "biàn", meaning: "changer", word: "变化"},
  {hanzi: "化", pinyin: "huà", meaning: "transformation", word: "变化"},
  {hanzi: "检", pinyin: "jiǎn", meaning: "vérifier", word: "检查"},
  {hanzi: "查", pinyin: "chá", meaning: "examiner", word: "检查"},
  {hanzi: "选", pinyin: "xuǎn", meaning: "choisir", word: "选择"},
  {hanzi: "择", pinyin: "zé", meaning: "choisir", word: "选择"},
  {hanzi: "较", pinyin: "jiào", meaning: "comparer", word: "比较"},
  {hanzi: "影", pinyin: "yǐng", meaning: "influencer", word: "影响"},
  {hanzi: "响", pinyin: "xiǎng", meaning: "résonner", word: "影响"},
  {hanzi: "根", pinyin: "gēn", meaning: "racine/selon", word: "根据"},
  {hanzi: "据", pinyin: "jù", meaning: "selon", word: "根据"},
  {hanzi: "参", pinyin: "cān", meaning: "participer", word: "参加"},
  {hanzi: "提", pinyin: "tí", meaning: "améliorer", word: "提高"},
  {hanzi: "注", pinyin: "zhù", meaning: "attention", word: "注意"},
  {hanzi: "意", pinyin: "yì", meaning: "sens/idée", word: "注意"},
  {hanzi: "记", pinyin: "jì", meaning: "se souvenir", word: "记得"},
  {hanzi: "接", pinyin: "jiē", meaning: "accepter", word: "接受"},
  {hanzi: "受", pinyin: "shòu", meaning: "recevoir", word: "接受"},
];

const seen = new Set();
const unique = chars.filter(c => { if(seen.has(c.hanzi)) return false; seen.add(c.hanzi); return true; });

const wordSet = new Set();
const words = [];
chars.forEach(c => {
  if(c.word && c.word.length >= 2 && !wordSet.has(c.word)) {
    wordSet.add(c.word);
    words.push({ word: c.word, pinyin: chars.filter(x => x.word === c.word).map(x => x.pinyin).join(' '), meaning: c.meaning });
  }
});

// ===== SECTION 1: Individual characters =====
const container = document.getElementById('sheets');
const PRACTICE_CELLS = 7;

unique.forEach((c, i) => {
  const row = document.createElement('div');
  row.className = 'char-row';
  
  row.innerHTML = `<div class="char-info">
    <div class="hanzi">${c.word}</div>
    <div class="pinyin">${c.pinyin}</div>
    <div class="meaning">${c.meaning}</div>
  </div>`;

  const gridDiv = document.createElement('div');
  gridDiv.className = 'grid-container';

  // Stroke order cell (HanziWriter with stroke numbers)
  const strokeCell = document.createElement('div');
  strokeCell.className = 'cell stroke-order';
  const hwId = 'hw-' + i;
  const hwDiv = document.createElement('div');
  hwDiv.id = hwId;
  hwDiv.style.cssText = 'width:48px;height:48px;';
  strokeCell.appendChild(hwDiv);
  gridDiv.appendChild(strokeCell);

  // Model cell (calligraphy)
  const modelCell = document.createElement('div');
  modelCell.className = 'cell model';
  modelCell.innerHTML = '<span class="char">' + c.hanzi + '</span>';
  gridDiv.appendChild(modelCell);

  // Ghost cell
  const ghostCell = document.createElement('div');
  ghostCell.className = 'cell ghost';
  ghostCell.innerHTML = '<span class="char">' + c.hanzi + '</span>';
  gridDiv.appendChild(ghostCell);

  // Empty cells
  for(let j = 0; j < PRACTICE_CELLS - 3; j++) {
    gridDiv.appendChild(Object.assign(document.createElement('div'), {className: 'cell'}));
  }

  row.appendChild(gridDiv);
  container.appendChild(row);

  // HanziWriter: show all strokes with numbers
  try {
    const writer = HanziWriter.create(hwId, c.hanzi, {
      width: 48, height: 48, padding: 2,
      showOutline: true, showCharacter: false,
      strokeColor: '#c0392b', outlineColor: '#ddd',
    });
    // Show strokes one by one with different colors for order
    const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#ff5722','#795548','#607d8b','#00bcd4','#8bc34a','#ff9800','#673ab7','#f44336','#4caf50','#2196f3','#ff5252','#69f0ae'];
    
    // Load char data to get stroke count, then show numbered
    fetch('https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/' + c.hanzi + '.json')
      .then(r => r.json())
      .then(data => {
        const n = data.strokes.length;
        // Show the character with all strokes
        writer.showCharacter();
        // Add stroke numbers as overlay with white background circles
        const svg = strokeCell.querySelector('svg');
        if(svg && data.medians) {
          data.medians.forEach((median, si) => {
            if(median.length > 0) {
              // Use a point ~20% along the stroke for better placement
              const ptIndex = Math.min(Math.floor(median.length * 0.15), median.length - 1);
              const pt = median[ptIndex];
              const x = (pt[0] / 1024) * 48;
              const y = ((1024 - pt[1]) / 1024) * 48;
              
              // White circle background for visibility
              const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              circle.setAttribute('cx', x);
              circle.setAttribute('cy', y - 1);
              circle.setAttribute('r', '6');
              circle.setAttribute('fill', 'white');
              circle.setAttribute('stroke', '#c0392b');
              circle.setAttribute('stroke-width', '1');
              svg.appendChild(circle);
              
              // Number text
              const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
              text.setAttribute('x', x);
              text.setAttribute('y', y + 2);
              text.setAttribute('font-size', '9');
              text.setAttribute('font-weight', 'bold');
              text.setAttribute('fill', '#c0392b');
              text.setAttribute('font-family', 'Arial, sans-serif');
              text.setAttribute('text-anchor', 'middle');
              text.textContent = (si + 1);
              svg.appendChild(text);
            }
          });
        }
      });

    strokeCell.style.cursor = 'pointer';
    strokeCell.addEventListener('click', () => {
      writer.hideCharacter();
      writer.animateCharacter();
    });
  } catch(e) {
    strokeCell.innerHTML = '<span class="char" style="color:#c0392b">' + c.hanzi + '</span>';
  }

  if((i+1) % 13 === 0 && i < unique.length - 1) {
    container.appendChild(Object.assign(document.createElement('div'), {className: 'page-break'}));
  }
});

// ===== SECTION 2: Compound words =====
const wordContainer = document.getElementById('word-sheets');
const WORD_REPS = 4;

words.forEach((w, wi) => {
  const row = document.createElement('div');
  row.className = 'char-row';
  row.innerHTML = `<div class="char-info">
    <div class="hanzi">${w.word}</div>
    <div class="pinyin">${w.pinyin}</div>
    <div class="meaning">${w.meaning}</div>
  </div>`;

  const gridDiv = document.createElement('div');
  gridDiv.className = 'grid-container';

  // Model pair
  const modelPair = document.createElement('div');
  modelPair.className = 'word-pair';
  for(const ch of w.word) {
    const cell = document.createElement('div');
    cell.className = 'cell model';
    cell.innerHTML = '<span class="char">' + ch + '</span>';
    modelPair.appendChild(cell);
  }
  gridDiv.appendChild(modelPair);
  gridDiv.appendChild(Object.assign(document.createElement('div'), {className: 'pair-separator'}));

  // Ghost pair
  const ghostPair = document.createElement('div');
  ghostPair.className = 'word-pair';
  for(const ch of w.word) {
    const cell = document.createElement('div');
    cell.className = 'cell ghost';
    cell.innerHTML = '<span class="char">' + ch + '</span>';
    ghostPair.appendChild(cell);
  }
  gridDiv.appendChild(ghostPair);

  // Practice pairs
  for(let r = 0; r < WORD_REPS; r++) {
    gridDiv.appendChild(Object.assign(document.createElement('div'), {className: 'pair-separator'}));
    const pair = document.createElement('div');
    pair.className = 'word-pair';
    for(const ch of w.word) pair.appendChild(Object.assign(document.createElement('div'), {className: 'cell'}));
    gridDiv.appendChild(pair);
  }

  row.appendChild(gridDiv);
  wordContainer.appendChild(row);

  if((wi+1) % 10 === 0 && wi < words.length - 1) {
    wordContainer.appendChild(Object.assign(document.createElement('div'), {className: 'page-break'}));
  }
});
</script>
</body>
</html>
